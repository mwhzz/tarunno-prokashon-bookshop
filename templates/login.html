{% load static %}
<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>লগইন — তারুণ্য প্রকাশন</title>
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --navy:    #1a3a6c;
  --navy-dk: #122852;
  --gold:    #c9a227;
  --gold-lt: #e8c96a;
  --bg:      #eef2f8;
  --white:   #ffffff;
  --text:    #0f1e38;
  --muted:   #5a6a82;
  --border:  #d4dce9;
  --red:     #dc2626;
  --green:   #16a34a;
}

html, body {
  height: 100%;
  font-family: 'Hind Siliguri', sans-serif;
  color: var(--text);
}

body {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16px;
  background:
    radial-gradient(ellipse 60% 50% at 10% 10%, rgba(26,58,108,.14) 0%, transparent 100%),
    radial-gradient(ellipse 50% 40% at 90% 90%, rgba(201,162,39,.12) 0%, transparent 100%),
    linear-gradient(150deg, #e8edf5 0%, #eef2f8 55%, #e3eaf5 100%);
}

/* ── Page wrapper ── */
.page-wrap {
  width: 100%;
  max-width: 460px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
}

/* ── Card ── */
.card {
  width: 100%;
  background: var(--white);
  border-radius: 18px;
  overflow: hidden;
  box-shadow:
    0 1px 3px rgba(26,58,108,.06),
    0 8px 32px rgba(26,58,108,.13),
    0 24px 64px rgba(26,58,108,.07);
}

/* ── Card header ── */
.card-head {
  background: linear-gradient(140deg, var(--navy) 0%, var(--navy-dk) 100%);
  padding: 36px 32px 30px;
  text-align: center;
  position: relative;
}

.card-head::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg,
    transparent 0%, var(--gold) 30%, var(--gold-lt) 50%, var(--gold) 70%, transparent 100%);
}

.logo-ring {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 100px;
  height: 100px;
  border-radius: 50%;
  background: rgba(255,255,255,.10);
  border: 2px solid rgba(255,255,255,.18);
  margin-bottom: 16px;
  box-shadow: 0 6px 20px rgba(0,0,0,.22);
}

.logo-ring img {
  width: 80px;
  height: 80px;
  object-fit: contain;
  border-radius: 50%;
}

.brand-name {
  font-size: 24px;
  font-weight: 700;
  color: #fff;
  line-height: 1.15;
  letter-spacing: .3px;
}

.brand-sub {
  margin-top: 5px;
  font-size: 10.5px;
  font-weight: 600;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--gold-lt);
}

/* ── Card body ── */
.card-body {
  padding: 30px 32px 26px;
}

.form-heading {
  font-size: 14px;
  font-weight: 700;
  color: var(--navy);
  padding-bottom: 12px;
  margin-bottom: 22px;
  border-bottom: 1.5px solid var(--border);
  letter-spacing: .2px;
}

/* alerts */
.alerts { list-style: none; margin-bottom: 18px; display: flex; flex-direction: column; gap: 6px; }
.alert {
  padding: 10px 14px;
  border-radius: 8px;
  font-size: 13px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.alert.error   { background: #fef2f2; color: var(--red);   border-left: 3px solid var(--red); }
.alert.success { background: #f0fdf4; color: var(--green); border-left: 3px solid var(--green); }

/* field */
.field { margin-bottom: 18px; }

.field label {
  display: block;
  font-size: 12.5px;
  font-weight: 700;
  color: var(--navy);
  margin-bottom: 7px;
  letter-spacing: .2px;
}

.input-box {
  position: relative;
}

.input-box .ico {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  width: 16px;
  height: 16px;
  color: #8fa3bd;
  pointer-events: none;
  flex-shrink: 0;
}

.input-box input {
  width: 100%;
  height: 46px;
  padding: 0 14px 0 40px;
  border: 1.5px solid var(--border);
  border-radius: 9px;
  font-size: 14px;
  font-family: inherit;
  color: var(--text);
  background: #f7f9fc;
  transition: border-color .17s, box-shadow .17s, background .17s;
  -webkit-appearance: none;
  appearance: none;
}

.input-box input::placeholder { color: #a8b8cc; }

.input-box input:focus {
  outline: none;
  border-color: var(--navy);
  background: #fff;
  box-shadow: 0 0 0 4px rgba(26,58,108,.10);
}

/* remember */
.remember {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 22px;
}

.remember input[type="checkbox"] {
  width: 16px;
  height: 16px;
  accent-color: var(--navy);
  cursor: pointer;
  flex-shrink: 0;
}

.remember label {
  font-size: 13px;
  color: var(--muted);
  cursor: pointer;
  user-select: none;
}

/* button */
.btn-submit {
  display: block;
  width: 100%;
  height: 48px;
  background: linear-gradient(135deg, var(--navy) 0%, var(--navy-dk) 100%);
  color: #fff;
  border: none;
  border-radius: 9px;
  font-size: 15px;
  font-weight: 700;
  font-family: inherit;
  letter-spacing: .5px;
  cursor: pointer;
  box-shadow: 0 5px 18px rgba(26,58,108,.30);
  transition: opacity .18s, box-shadow .18s, transform .15s;
  -webkit-appearance: none;
  appearance: none;
}

.btn-submit:hover  { opacity: .91; box-shadow: 0 8px 24px rgba(26,58,108,.36); }
.btn-submit:active { transform: translateY(1px); }

/* card footer */
.card-foot {
  border-top: 1.5px solid var(--border);
  padding: 15px 32px 20px;
  text-align: center;
  font-size: 13px;
  color: var(--muted);
}

.card-foot a {
  color: var(--gold);
  font-weight: 700;
  text-decoration: none;
}
.card-foot a:hover { color: var(--navy); }

/* copyright */
.copy {
  font-size: 11.5px;
  color: #97a8be;
  text-align: center;
}

/* ── Responsive ── */
@media (max-width: 480px) {
  body { padding: 12px; align-items: flex-start; padding-top: 24px; }

  .card-head { padding: 28px 22px 24px; }
  .logo-ring { width: 84px; height: 84px; }
  .logo-ring img { width: 66px; height: 66px; }
  .brand-name { font-size: 20px; }

  .card-body  { padding: 24px 22px 20px; }
  .card-foot  { padding: 14px 22px 18px; }

  .input-box input { height: 44px; font-size: 15px; }
  .btn-submit { height: 46px; font-size: 15px; }
}

@media (max-width: 360px) {
  .brand-name { font-size: 18px; }
  .brand-sub  { letter-spacing: 2px; }
}
</style>
</head>
<body>

<div class="page-wrap">
  <div class="card">

    <!-- ── Header ── -->
    <div class="card-head">
      <div class="logo-ring">
        <img src="{% static 'images/logo.jpeg' %}" alt="তারুণ্য প্রকাশন লোগো">
      </div>
      <div class="brand-name">তারুণ্য প্রকাশন</div>
      <div class="brand-sub">Tarunya Prokashon</div>
    </div>

    <!-- ── Body ── -->
    <div class="card-body">
      <div class="form-heading">পয়েন্ট অব সেল — লগইন</div>

      {% if messages %}
        <ul class="alerts">
          {% for message in messages %}
            <li class="alert {{ message.tags }}">{{ message }}</li>
          {% endfor %}
        </ul>
      {% endif %}

      <form method="POST" autocomplete="on">
        {% csrf_token %}

        <div class="field">
          <label for="id_username">ইউজারনেম</label>
          <div class="input-box">
            <svg class="ico" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
            <input type="text" id="id_username" name="username"
              placeholder="আপনার ইউজারনেম লিখুন" required autofocus autocomplete="username">
          </div>
        </div>

        <div class="field">
          <label for="id_password">পাসওয়ার্ড</label>
          <div class="input-box">
            <svg class="ico" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input type="password" id="id_password" name="password"
              placeholder="আপনার পাসওয়ার্ড লিখুন" required autocomplete="current-password">
          </div>
        </div>

        <div class="remember">
          <input type="checkbox" id="remember" name="remember">
          <label for="remember">আমাকে মনে রাখুন</label>
        </div>

        <button type="submit" class="btn-submit">লগইন করুন →</button>
      </form>
    </div>

    <!-- ── Footer ── -->
    <div class="card-foot">
      একাউন্ট নেই? <a href="/register/">নতুন একাউন্ট খুলুন</a>
    </div>

  </div>

  <div class="copy">© তারুণ্য প্রকাশন · সর্বস্বত্ব সংরক্ষিত</div>
</div>

</body>
</html>
