{% load static %}
<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>লগইন — তারুণ্য প্রকাশন</title>
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --navy:      #1a3a6c;
  --navy-dark: #122852;
  --gold:      #c9a227;
  --gold-lt:   #e8c96a;
  --bg:        #f0f3f8;
  --surface:   #ffffff;
  --text:      #0f1e38;
  --muted:     #5a6a82;
  --border:    #dce4ef;
}

body {
  font-family: 'Hind Siliguri', sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  background:
    radial-gradient(ellipse at top left,  rgba(26,58,108,.13) 0%, transparent 42%),
    radial-gradient(ellipse at bottom right, rgba(201,162,39,.10) 0%, transparent 40%),
    linear-gradient(150deg, #e8edf5 0%, #f0f3f8 50%, #e4ecf6 100%);
  color: var(--text);
}

/* ─── Card ─── */
.login-card {
  width: 100%;
  max-width: 430px;
  background: var(--surface);
  border-radius: 16px;
  box-shadow:
    0 2px 6px rgba(26,58,108,.06),
    0 12px 40px rgba(26,58,108,.12);
  overflow: hidden;
}

/* ─── Header stripe ─── */
.card-header {
  background: linear-gradient(135deg, var(--navy) 0%, var(--navy-dark) 100%);
  padding: 32px 36px 28px;
  text-align: center;
  position: relative;
}

.card-header::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, transparent 0%, var(--gold) 40%, var(--gold-lt) 60%, transparent 100%);
}

.logo-wrap {
  display: flex;
  justify-content: center;
  margin-bottom: 14px;
}

.logo-wrap img {
  width: 96px;
  height: 96px;
  object-fit: contain;
  filter: drop-shadow(0 4px 12px rgba(0,0,0,.25));
}

.brand-bn {
  font-size: 22px;
  font-weight: 700;
  color: #ffffff;
  letter-spacing: .4px;
  line-height: 1.2;
}

.brand-en {
  font-size: 11px;
  font-weight: 600;
  color: var(--gold-lt);
  letter-spacing: 2.5px;
  text-transform: uppercase;
  margin-top: 4px;
}

/* ─── Body ─── */
.card-body {
  padding: 32px 36px 28px;
}

.section-title {
  font-size: 15px;
  font-weight: 700;
  color: var(--navy);
  margin-bottom: 22px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
}

/* ─── Messages ─── */
.messages { list-style: none; margin-bottom: 18px; }
.message {
  padding: 10px 14px;
  border-radius: 7px;
  font-size: 13px;
  margin-bottom: 6px;
}
.message.error   { background: #fee2e2; color: #b91c1c; border-left: 3px solid #f87171; }
.message.success { background: #ecfdf5; color: #065f46; border-left: 3px solid #34d399; }

/* ─── Form ─── */
.form-group { margin-bottom: 18px; }

.form-group label {
  display: block;
  font-size: 13px;
  font-weight: 700;
  color: var(--navy);
  margin-bottom: 7px;
  letter-spacing: .2px;
}

.input-wrap {
  position: relative;
}

.input-wrap svg {
  position: absolute;
  left: 13px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--muted);
  width: 16px;
  height: 16px;
  flex-shrink: 0;
}

.form-group input[type="text"],
.form-group input[type="password"] {
  width: 100%;
  padding: 11px 14px 11px 40px;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  font-size: 14px;
  font-family: inherit;
  color: var(--text);
  background: #f8fafc;
  transition: border-color .18s, box-shadow .18s;
}

.form-group input:focus {
  outline: none;
  border-color: var(--navy);
  background: #fff;
  box-shadow: 0 0 0 4px rgba(26,58,108,.09);
}

/* ─── Remember row ─── */
.remember-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 22px;
}

.remember-row input[type="checkbox"] {
  width: 15px;
  height: 15px;
  accent-color: var(--navy);
  cursor: pointer;
}

.remember-row label {
  font-size: 13px;
  color: var(--muted);
  cursor: pointer;
}

/* ─── Button ─── */
.btn-login {
  width: 100%;
  padding: 13px;
  background: linear-gradient(135deg, var(--navy) 0%, var(--navy-dark) 100%);
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 15px;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  letter-spacing: .5px;
  transition: opacity .2s, box-shadow .2s;
  box-shadow: 0 6px 20px rgba(26,58,108,.28);
}

.btn-login:hover {
  opacity: .92;
  box-shadow: 0 8px 26px rgba(26,58,108,.36);
}

/* ─── Footer ─── */
.card-footer {
  text-align: center;
  padding: 16px 36px 22px;
  font-size: 13px;
  color: var(--muted);
  border-top: 1px solid var(--border);
}

.card-footer a {
  color: var(--gold);
  font-weight: 700;
  text-decoration: none;
}

.card-footer a:hover { color: var(--navy); }

/* ─── Bottom copyright ─── */
.copyright {
  text-align: center;
  margin-top: 18px;
  font-size: 12px;
  color: #94a3b8;
}
</style>
</head>
<body>

<div>
  <div class="login-card">

    <!-- Header -->
    <div class="card-header">
      <div class="logo-wrap">
        <img src="{% static 'images/logo.png' %}" alt="Tarunya Prokashon Logo">
      </div>
      <div class="brand-bn">তারুণ্য প্রকাশন</div>
      <div class="brand-en">Tarunya Prokashon</div>
    </div>

    <!-- Body -->
    <div class="card-body">
      <div class="section-title">পয়েন্ট অব সেল — লগইন</div>

      {% if messages %}
        <ul class="messages">
          {% for message in messages %}
            <li class="message {{ message.tags }}">{{ message }}</li>
          {% endfor %}
        </ul>
      {% endif %}

      <form method="POST">
        {% csrf_token %}

        <div class="form-group">
          <label for="username">ইউজারনেম</label>
          <div class="input-wrap">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
            </svg>
            <input type="text" id="username" name="username" placeholder="আপনার ইউজারনেম" required autofocus autocomplete="username">
          </div>
        </div>

        <div class="form-group">
          <label for="password">পাসওয়ার্ড</label>
          <div class="input-wrap">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input type="password" id="password" name="password" placeholder="আপনার পাসওয়ার্ড" required autocomplete="current-password">
          </div>
        </div>

        <div class="remember-row">
          <input type="checkbox" id="remember" name="remember">
          <label for="remember">আমাকে মনে রাখুন</label>
        </div>

        <button type="submit" class="btn-login">লগইন করুন</button>
      </form>
    </div>

    <!-- Footer -->
    <div class="card-footer">
      একাউন্ট নেই? <a href="/register/">নতুন একাউন্ট খুলুন</a>
    </div>

  </div>

  <div class="copyright">© তারুণ্য প্রকাশন · সর্বস্বত্ব সংরক্ষিত</div>
</div>

</body>
</html>
